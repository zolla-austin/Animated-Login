<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Login</title>

    <!-- Font Awesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Animated Circle -->
      <div class="circle-container" id="circleContainer"></div>

      <!-- Glowing light behind login -->
      <div class="background-light"></div>

      <!-- Login Box -->
      <div class="login-box">
        <h2>Login</h2>

        <form>
          <div class="input-group">
            <input type="email" placeholder="Email" required />
            <span class="input-icon">
              <i class="fa-solid fa-envelope"></i>
            </span>
          </div>

          <div class="input-group">
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <span class="input-icon toggle-password" id="togglePassword">
              <i class="fa-solid fa-lock"></i>
            </span>
          </div>

          <div class="forgot-password">
            <a href="#">Forgot your password?</a>
          </div>

          <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="social-login">
          <p>Log in with</p>
          <div class="social-icons">
            <div class="social-icon facebook">f</div>
            <div class="social-icon twitter">𝕏</div>
            <div class="social-icon google">G</div>
          </div>
        </div>

        <div class="signup-link">
          <a href="#">Sign Up</a>
        </div>
      </div>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
